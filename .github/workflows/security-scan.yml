name: Plugin Security Scan

on:
  issues:
    types: [opened, edited]

# The scan job only reads code. It must not have write access.
permissions:
  contents: read
  issues: write

jobs:
  security-scan:
    # Only run if the issue has "[Plugin Submission]" in the title
    if: contains(github.event.issue.title, '[Plugin Submission]')
    runs-on: ubuntu-latest

    steps:
      # 1. Parse the JSON from the Issue Body
      #    Writes the body to a temp file first to safely handle
      #    multi-line content, special characters, and shell escaping.
      - name: Extract Payload from Issue
        id: extract
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Write body to a temp file to avoid shell escaping issues
          printf '%s' "$ISSUE_BODY" > /tmp/issue_body.txt

          # Extract the text between the ```json and ``` markers
          JSON_PAYLOAD=$(awk '/```json/{flag=1; next} /```/{flag=0} flag' /tmp/issue_body.txt)

          # Validate that we actually extracted something
          if [ -z "$JSON_PAYLOAD" ]; then
            echo "::error::Could not extract JSON payload from issue body."
            exit 1
          fi

          # Parse individual fields with jq
          REPO_URL=$(echo "$JSON_PAYLOAD" | jq -r '.repository_url // empty')
          COMMIT_HASH=$(echo "$JSON_PAYLOAD" | jq -r '.commit_hash // empty')

          # Validate required fields
          if [ -z "$REPO_URL" ] || [ -z "$COMMIT_HASH" ]; then
            echo "::error::Missing required fields: repository_url or commit_hash."
            exit 1
          fi

          # actions/checkout expects "owner/repo", not a full URL.
          # Strip the https://github.com/ prefix and any trailing .git
          REPO_OWNER_NAME=$(echo "$REPO_URL" | sed -E 's|^https?://github\.com/||' | sed 's|\.git$||' | sed 's|/$||')

          # Validate that the result looks like "owner/repo"
          if ! echo "$REPO_OWNER_NAME" | grep -qE '^[^/]+/[^/]+$'; then
            echo "::error::repository_url does not resolve to a valid owner/repo format: '$REPO_OWNER_NAME'"
            exit 1
          fi

          echo "REPO_URL=$REPO_URL" >> "$GITHUB_ENV"
          echo "COMMIT_HASH=$COMMIT_HASH" >> "$GITHUB_ENV"
          echo "REPO_OWNER_NAME=$REPO_OWNER_NAME" >> "$GITHUB_ENV"

          echo "### Extracted Payload" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Repository:** $REPO_OWNER_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** $COMMIT_HASH" >> "$GITHUB_STEP_SUMMARY"

      # 2. Checkout YOUR scanner tools (plugins-test repo)
      - name: Checkout Scanner Tools
        uses: actions/checkout@v4
        with:
          path: 'scanner-tools'

      # 3. Checkout THEIR plugin code at the exact commit hash
      - name: Checkout Target Plugin
        uses: actions/checkout@v4
        with:
          repository: ${{ env.REPO_OWNER_NAME }}
          ref: ${{ env.COMMIT_HASH }}
          path: 'target-plugin'

      # 4. Verify the checkout landed on the expected commit
      - name: Verify Checkout Integrity
        working-directory: target-plugin
        run: |
          ACTUAL_HASH=$(git rev-parse HEAD)
          if [ "$ACTUAL_HASH" != "${{ env.COMMIT_HASH }}" ]; then
            echo "::error::Checkout integrity failed. Expected ${{ env.COMMIT_HASH }}, got $ACTUAL_HASH"
            exit 1
          fi
          echo "Checkout verified: $ACTUAL_HASH"
